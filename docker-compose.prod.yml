# Production-oriented compose (single host: UI + API).
# Use with: docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build

services:
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-8001}:8000"
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.production}
    environment:
      DATABASE_URL: sqlite:///./data/app.db
    volumes:
      - backend-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 20s
      timeout: 7s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "${FRONTEND_BIND_HOST:-127.0.0.1}:${FRONTEND_PORT:-8081}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 7s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  backend-data:
